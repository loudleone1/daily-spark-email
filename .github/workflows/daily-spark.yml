name: Daily Spark Email

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Compute local marker date
        id: marker-date
        env:
          TIMEZONE: ${{ vars.TIMEZONE || 'America/New_York' }}
        run: echo "date=$(TZ="$TIMEZONE" date +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore daily sent marker
        id: restore-marker
        uses: actions/cache/restore@v4
        with:
          path: .daily-spark-state
          key: daily-spark-sent-${{ steps.marker-date.outputs.date }}

      - name: Send daily spark email
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS || 'true' }}
          SMTP_TIMEOUT_SECONDS: ${{ vars.SMTP_TIMEOUT_SECONDS || '60' }}
          TARGET_HOUR_LOCAL: ${{ vars.TARGET_HOUR_LOCAL || '8' }}
          TIMEZONE: ${{ vars.TIMEZONE || 'America/New_York' }}
          SPARK_EXTRA_CONTEXT: ${{ vars.SPARK_EXTRA_CONTEXT }}
          HTTP_TIMEOUT_SECONDS: ${{ vars.HTTP_TIMEOUT_SECONDS || '120' }}
          HTTP_MAX_ATTEMPTS: ${{ vars.HTTP_MAX_ATTEMPTS || '3' }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          SENT_MARKER_DIR: .daily-spark-state
        run: python scripts/daily_spark.py

      - name: Save daily sent marker
        if: success() && steps.restore-marker.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .daily-spark-state
          key: daily-spark-sent-${{ steps.marker-date.outputs.date }}
